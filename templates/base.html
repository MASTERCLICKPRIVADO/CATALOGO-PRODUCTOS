<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} MasterClick {% endblock %}</title>

    <!--
        Validación de sesión por-pestaña.
        sessionStorage se borra automáticamente cuando el usuario cierra la
        pestaña/navegador (a diferencia de las cookies, que algunos navegadores
        restauran al reabrir). Usamos un marcador en sessionStorage como
        prueba de que ESTA pestaña inició la sesión actual.
    -->
    <script>
    (function validateBrowserSession() {
        const isLoggedIn  = {{ 'true' if request.session.get('user') else 'false' }};
        const isFreshLogin = {{ 'true' if request.session.get('fresh_login') else 'false' }};
        const MARKER_KEY = 'mc_browser_session';

        if (!isLoggedIn) {
            // Sin sesión en el servidor: limpia cualquier marcador remanente.
            sessionStorage.removeItem(MARKER_KEY);
            return;
        }

        if (isFreshLogin) {
            // Primer pageview tras /login → autoriza esta pestaña.
            sessionStorage.setItem(MARKER_KEY, '1');
            return;
        }

        // Hay sesión en el servidor, pero esta pestaña no tiene marcador.
        // Significa que el navegador restauró la cookie tras cerrar/abrir,
        // o que se abrió una pestaña nueva. Forzamos logout.
        if (!sessionStorage.getItem(MARKER_KEY)) {
            window.location.replace('/logout');
        }
    })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', path='estilos2.css') }}">
</head>
<body>
    {% include 'includes/navbar.html' %}
    
    <!-- Botón Flotante para Filtros (solo en páginas que lo activen) -->
    {% block filter_button %}{% endblock %}

    <!-- Sidebar para Filtros -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Filtros</h2>
            <button class="close-sidebar" id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-content">
            {% block sidebar %}{% endblock %}
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const closeBtn = document.getElementById('closeSidebar');
        const openBtn = document.getElementById('openFilters');

        function toggleSidebar(forceOpen = null) {
            const isOpen = forceOpen !== null ? forceOpen : !sidebar.classList.contains('active');
            
            if (isOpen) {
                sidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                sessionStorage.setItem('sidebarOpen', 'true');
            } else {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                sessionStorage.setItem('sidebarOpen', 'false');
            }
        }

        // Restaurar estado al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('sidebarOpen') === 'true') {
                toggleSidebar(true);
            }
        });

        if (openBtn) openBtn.addEventListener('click', () => toggleSidebar(true));
        closeBtn.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        let lastScrollTop = 0;
        const header = document.querySelector('header');
        
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 10) {
                // Scroll down
                header.classList.add('nav-hidden');
            } else {
                // Scroll up
                header.classList.remove('nav-hidden');
            }
            
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        // (El cierre de sesión al cerrar pestaña/navegador se maneja con el
        //  marcador de sessionStorage validado en el <head> de esta plantilla.
        //  No usamos `pagehide` + beacon porque se disparaba en cada
        //  navegación interna y producía logouts inesperados.)

        // Actualizar el badge del carrito al cargar cualquier página
        (function actualizarBadgeCarrito() {
            const badge = document.getElementById('cart-badge');
            if (!badge) return;
            fetch('/api/carrito/contador')
                .then(r => r.json())
                .then(data => {
                    const total = data.total || 0;
                    badge.textContent = total;
                    badge.style.display = total > 0 ? 'inline-block' : 'none';
                })
                .catch(() => {});
        })();
    </script>
</body>
</html>
