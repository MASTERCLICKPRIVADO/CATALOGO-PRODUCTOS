<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} FastComponents {% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='estilos2.css') }}">
</head>
<body>
    {% include 'includes/navbar.html' %}
    
    <!-- Botón Flotante para Filtros (Siempre visible) -->
    <button id="openFilters" class="fixed-hamburger-btn">
        <span>&#9776;</span>
        <span class="btn-text">Filtros</span>
    </button>

    <!-- Sidebar para Filtros -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Filtros</h2>
            <button class="close-sidebar" id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-content">
            {% block sidebar %}{% endblock %}
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const closeBtn = document.getElementById('closeSidebar');
        const openBtn = document.getElementById('openFilters');

        function toggleSidebar(forceOpen = null) {
            const isOpen = forceOpen !== null ? forceOpen : !sidebar.classList.contains('active');
            
            if (isOpen) {
                sidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                sessionStorage.setItem('sidebarOpen', 'true');
            } else {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                sessionStorage.setItem('sidebarOpen', 'false');
            }
        }

        // Restaurar estado al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('sidebarOpen') === 'true') {
                toggleSidebar(true);
            }
        });

        if (openBtn) openBtn.addEventListener('click', () => toggleSidebar(true));
        closeBtn.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        let lastScrollTop = 0;
        const header = document.querySelector('header');
        
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 10) {
                // Scroll down
                header.classList.add('nav-hidden');
            } else {
                // Scroll up
                header.classList.remove('nav-hidden');
            }
            
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        // Cerrar sesión automáticamente al cerrar la pestaña o el navegador
        window.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                // Opcional: podrías implementar un timer aquí si no quieres que sea instantáneo al cambiar de pestaña
            }
        });

        window.addEventListener('pagehide', function() {
            // navigator.sendBeacon es el método más confiable para enviar datos al servidor al cerrar la página
            navigator.sendBeacon('/logout');
        });
    </script>
</body>
</html>
