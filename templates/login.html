{% extends 'base.html' %}

{% block title %} Iniciar Sesión - MasterSeries{% endblock %}

{% block content %}
<div class="contenedor" style="display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px 15px;">
    <div class="carta" style="max-width: 400px; width: 100%; padding: 40px; background: white; border-radius: 24px;">
        <h2 style="margin-bottom: 20px;">Iniciar Sesión</h2>
        
        {% if error %}
        <div style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 14px;">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="post" autocomplete="off">
            <div style="margin-bottom: 16px;">
                <label for="username" style="display: block; margin-bottom: 8px; font-weight: 600;">Usuario</label>
                <input type="text" id="username" name="username" class="search-input"
                       placeholder="tu@email.com" required
                       value="{{ form.username or '' }}">
            </div>

            <div style="margin-bottom: 16px;">
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 600;">Contraseña</label>
                <input type="password" id="password" name="password" class="search-input"
                       placeholder="••••••••" required>
            </div>

            <div style="margin-bottom: 24px;">
                <label for="codigo_referido" style="display: block; margin-bottom: 8px; font-weight: 600;">
                    Código de referido
                </label>
                <input type="text" id="codigo_referido" name="codigo_referido" class="search-input"
                       placeholder="Ej. ABC123"
                       value="{{ form.codigo_referido or '' }}"
                       style="text-transform: uppercase;">
                <label class="reserva-chk-row">
                            <input type="checkbox" name="acepta_tratamiento" id="chk-tratamiento" required>
                            <span>
                                Acepto el <strong>tratamiento de datos</strong> conforme a la
                                <a href="https://masterseries.com.co/politica-de-tratamiento-de-la-informacion"
                                   target="_blank" rel="noopener noreferrer"
                                   style="color: #2e7d32; text-decoration: underline;">
                                   política de tratamiento
                                </a>.
                            </span>
                        </label>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <div style="display: flex; align-items: center; gap: 10px; margin: 22px 0 16px;">
            <hr style="flex: 1; border: none; border-top: 1px solid #e5e5e5;">
            <span style="color: #999; font-size: 12px;">o</span>
            <hr style="flex: 1; border: none; border-top: 1px solid #e5e5e5;">
        </div>

        <a href="/registro"
           style="display: block; text-align: center; padding: 12px; border-radius: 12px;
                  background: #f3f3f3; color: #444; text-decoration: none; font-weight: 600;
                  border: 1px solid #ddd;">
            Crear cuenta nueva
        </a>
    </div>
</div>
{% endblock %}

{% block sidebar %}
<p>Inicia sesión para ver el catálogo completo de productos.</p>
{% endblock %}
