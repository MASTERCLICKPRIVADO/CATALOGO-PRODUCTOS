<header>
    <div class="header-container">
        <a href="/" class="logo-wrapper">
            <img src="{{ url_for('static', path='img/ESCUDO.jpeg') }}" alt="Escudo" style="height: 50px; width: auto; border-radius: 8px;">
            <div class="logo-title">
                <h1>MASTER SERIES</h1>
            </div>
        </a>
        
        <nav style="display: flex; align-items: center; gap: 20px;">
            {% if request.session.user %}
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <span style="font-weight: bold; color: #8a8f64; font-size: 14px;">{{ request.session.user }}</span>
                    <span style="font-size: 11px; color: #666;">{{ request.session.city }}</span>
                </div>
                <a href="/logout" class="btn" style="width: auto; padding: 8px 15px; font-size: 12px; background: #c62828;">Cerrar Sesión</a>
            {% endif %}
        </nav>
    </div>
</header>
